services:
  actual-ai:
    container_name: actual-ai
    build:
      context: .
    image: ghcr.io/YOUR_GITHUB_USERNAME/actual-ai:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persistent storage for Actual Budget metadata and sync state
      - ./data:/opt/node_app/data
    environment:
      - NODE_ENV=production
      - AI_MODEL=${AI_MODEL:-mistral-nemo}
      - OLLAMA_BASE_URL=${OLLAMA_URL}
      - ACTUAL_SERVER_URL=${ACTUAL_SERVER_URL}
      - ACTUAL_SERVER_PASSWORD=${ACTUAL_PASSWORD}
      - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
      - ACTUAL_BUDGET_ID=${ACTUAL_BUDGET_ID}
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 */4 * * * }
      - NODE_TLS_REJECT_UNAUTHORIZED=0

volumes:
  data:
